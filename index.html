<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap"
            rel="stylesheet"
        />
        <!-- Reset css -->
        <link rel="stylesheet" href="./assets/css/reset.css" />
        <!-- Style css-->
        <link rel="stylesheet" href="./assets/css/style.css" />
    </head>
    <body style="height: 50000px">
        <header class="header fixed">
            <div class="main-content">
                <div class="header-row">
                    <!-- Logo -->
                    <img
                        src="./assets/icon/logo.svg"
                        alt="besnik"
                        class="logo"
                    />
                    <!-- Nav -->
                    <nav class="nav-list">
                        <ul>
                            <li>
                                <a href="#!">Home</a>
                            </li>
                            <li>
                                <a href="#!">Features</a>
                            </li>
                            <li>
                                <a href="#!">Pricing</a>
                            </li>
                            <li>
                                <a href="#!">About</a>
                            </li>
                            <li>
                                <a href="#!">Contact</a>
                            </li>
                        </ul>
                    </nav>
                    <!-- Btn -->
                    <div class="header-btn">
                        <button class="sign-in-btn">Sign in</button>
                        <button class="btn sign-up-btn">Sign up</button>
                    </div>
                </div>
            </div>
        </header>
        <main>
            <div class="hero">
                <div class="main-content">
                    <div class="hero-row">
                        <div class="hero-left">
                            <p class="text">😎 EASY LEAENING PLATFORM</p>
                            <h1 class="heading">Words learner come here.</h1>
                            <p class="desc lv1">
                                Build skills with courses, certificates, and get
                                online knowledge from our world-class platform.
                            </p>
                            <div class="act-btn">
                                <button class="btn get-started-btn">
                                    <a href="#!"> Get Started </a>
                                </button>
                                <button class="btn-watch">
                                    <img
                                        src="./assets/icon/ic-pause.svg"
                                        alt="pause"
                                    />
                                </button>
                            </div>
                        </div>
                        <div class="hero-right">
                            <img
                                src="./assets/img/img-hero.svg"
                                alt="Words learner come here."
                                class="img"
                            />
                            <!-- INFO 1 -->
                            <div class="info-books">
                                <img
                                    src="./assets/icon/ic-book.svg"
                                    alt="books"
                                    class="img-book"
                                />
                                <div class="line"></div>
                                <p class="sub-text course">Courses 1000+</p>
                            </div>
                            <!-- INFO 2 -->
                            <div class="info-schedules">
                                <p class="sub-text">Schedules</p>
                                <img
                                    src="./assets/icon/ic-line1.svg"
                                    alt="l1"
                                    class="line-schedule"
                                />
                                <img
                                    src="./assets/icon/ic-line2.svg"
                                    alt="l2"
                                    class="line-schedule"
                                />
                                <img
                                    src="./assets/icon/ic-line3.svg"
                                    alt="l3"
                                    class="line-schedule"
                                />
                                <img
                                    src="./assets/icon/ic-line4.svg"
                                    alt="l4"
                                    class="line-schedule"
                                />
                            </div>
                            <!-- INFO 3 -->
                            <div class="info-users">
                                <p class="sub-text">Our Active Students</p>
                                <div class="avatars">
                                    <img
                                        src="./assets/img/av1.jpg"
                                        alt="a1"
                                        class="avatar"
                                    />
                                    <img
                                        src="./assets/img/av2.jpg"
                                        alt="a2"
                                        class="avatar"
                                    />
                                    <img
                                        src="./assets/img/av3.jpg"
                                        alt="a3"
                                        class="avatar"
                                    />
                                    <img
                                        src="./assets/img/av4.jpg"
                                        alt="a4"
                                        class="avatar"
                                    />
                                    <div class="avatar sub-text">10k +</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
